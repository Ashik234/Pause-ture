<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pause-ture Settings</title>
    <script type="module" src="/src/settings.ts" defer></script>
    <style>
      :root {
        --bg: #0f141b;
        --card: #171f29;
        --card-hover: #1b2431;
        --line: #26313f;
        --text: #e9eef4;
        --muted: #8b9aab;
        --accent: #4c9aff;
        --accent-dim: rgba(76, 154, 255, 0.14);
        --ok: #57c98a;
        --radius: 14px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
        user-select: none;
      }

      header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1.4rem 1.4rem 1rem;
      }

      .mark {
        display: flex;
        gap: 5px;
        align-items: center;
        padding: 9px 8px;
        background: linear-gradient(135deg, #1b2735, #090a0f);
        border-radius: 10px;
      }

      .mark i {
        display: block;
        width: 6px;
        height: 20px;
        border-radius: 3px;
        background: #f5f5f5;
      }

      .mark i:last-child {
        background: var(--accent);
      }

      header h1 {
        font-family: "Segoe UI Variable Display", "Segoe UI", sans-serif;
        font-size: 1.25rem;
        font-weight: 650;
        letter-spacing: -0.01em;
      }

      header p {
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: 0.1rem;
      }

      main {
        flex: 1;
        padding: 0 1.4rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        overflow-y: auto;
      }

      .row {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: start;
        gap: 0.75rem;
        padding: 0.85rem;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        transition: background 0.15s ease, opacity 0.2s ease;
      }

      .row:hover {
        background: var(--card-hover);
      }

      .tile {
        display: grid;
        place-items: center;
        width: 40px;
        height: 40px;
        font-size: 1.25rem;
        background: var(--accent-dim);
        border-radius: 11px;
        transition: filter 0.2s ease;
      }

      .name {
        font-size: 0.98rem;
        font-weight: 600;
        line-height: 1.2;
        padding-top: 0.1rem;
      }

      .sub {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 0.15rem;
      }

      .row.off .tile {
        filter: grayscale(1) brightness(0.7);
      }

      .row.off .name,
      .row.off .sub,
      .row.off .stepper {
        opacity: 0.4;
        pointer-events: none;
      }

      /* stepper */
      .stepper {
        display: inline-flex;
        align-items: center;
        gap: 0.15rem;
        margin-top: 0.6rem;
        padding: 0.2rem;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 999px;
        transition: opacity 0.2s ease;
      }

      .stepper button {
        width: 26px;
        height: 26px;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-size: 1rem;
        font-family: inherit;
        line-height: 1;
        cursor: pointer;
        transition: background 0.12s ease, color 0.12s ease;
      }

      .stepper button:hover {
        background: var(--accent-dim);
        color: var(--accent);
      }

      .stepper input {
        width: 2.6ch;
        border: none;
        background: transparent;
        color: var(--text);
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        text-align: right;
        appearance: textfield;
      }

      .stepper input::-webkit-outer-spin-button,
      .stepper input::-webkit-inner-spin-button {
        appearance: none;
      }

      .stepper .unit {
        font-size: 0.75rem;
        color: var(--muted);
        padding-right: 0.2rem;
      }

      /* toggle */
      .switch {
        position: relative;
        display: inline-block;
        width: 38px;
        height: 22px;
        margin-top: 0.35rem;
      }

      .switch input {
        position: absolute;
        opacity: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        cursor: pointer;
      }

      .switch .knob {
        position: absolute;
        inset: 0;
        background: var(--line);
        border-radius: 999px;
        pointer-events: none;
        transition: background 0.18s ease;
      }

      .switch .knob::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 16px;
        height: 16px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.18s ease;
      }

      .switch input:checked + .knob {
        background: var(--accent);
      }

      .switch input:checked + .knob::after {
        transform: translateX(16px);
      }

      .switch input:focus-visible + .knob {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      footer {
        padding: 1rem 1.4rem 1.4rem;
      }

      #save {
        width: 100%;
        padding: 0.8rem;
        font-size: 1rem;
        font-weight: 600;
        font-family: inherit;
        color: #071018;
        background: var(--accent);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.08s ease;
      }

      #save:hover {
        background: #66aaff;
      }

      #save:active {
        transform: scale(0.985);
      }

      #save.saved {
        background: var(--ok);
      }

      #save.error {
        background: #e5675f;
        color: #fff;
      }

      button:focus-visible,
      input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="mark"><i></i><i></i></div>
      <div>
        <h1>Settings</h1>
        <p>How often each break interrupts you</p>
      </div>
    </header>

    <main id="rows"></main>

    <footer>
      <button id="save">Save changes</button>
    </footer>
  </body>
</html>
