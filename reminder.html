<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pause-ture reminder</title>
    <script type="module" src="/src/reminder.ts" defer></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #1b2735 0%, #090a0f 100%);
        color: #f5f5f5;
        font-family: "Segoe UI", system-ui, sans-serif;
        user-select: none;
        cursor: default;
      }

      .card {
        text-align: center;
        max-width: 40rem;
        padding: 2rem;
      }

      #emoji {
        font-size: 6rem;
        line-height: 1;
      }

      h1 {
        margin-top: 1.5rem;
        font-size: 3rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      #message {
        margin-top: 1rem;
        font-size: 1.4rem;
        color: #b8c4d0;
      }

      #done {
        margin-top: 3rem;
        padding: 0.9rem 3.5rem;
        font-size: 1.2rem;
        font-family: inherit;
        color: #090a0f;
        background: #f5f5f5;
        border: none;
        border-radius: 999px;
        cursor: pointer;
      }

      #done:hover {
        background: #ffffff;
      }
    </style>
  </head>

  <body>
    <main class="card">
      <div id="emoji"></div>
      <h1 id="title"></h1>
      <p id="message"></p>
      <button id="done">Done ✓</button>
    </main>
  </body>
</html>
