<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pause-ture reminder</title>
    <script type="module" src="/src/reminder.ts" defer></script>
    <style>
      :root {
        --text: #e9eef4;
        --muted: #a7b4c2;
        --accent: #4c9aff;
        --accent-dim: rgba(76, 154, 255, 0.16);
        --line: rgba(255, 255, 255, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        background: transparent;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        /* Translucent veil — whatever you were doing stays visible behind. */
        background: radial-gradient(
          ellipse at center,
          rgba(15, 20, 27, 0.72) 0%,
          rgba(9, 10, 15, 0.9) 100%
        );
        color: var(--text);
        font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
        user-select: none;
        cursor: default;
      }

      .card {
        text-align: center;
        max-width: 44rem;
        padding: 2rem;
        animation: enter 0.25s ease-out;
      }

      @keyframes enter {
        from {
          opacity: 0;
          transform: scale(0.97);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* Countdown done — whole popup (veil included) fades away. */
      body.leave {
        animation: leave 0.4s ease forwards;
      }

      @keyframes leave {
        to {
          opacity: 0;
        }
      }

      .item + .item {
        margin-top: 2.5rem;
      }

      .tile {
        display: inline-grid;
        place-items: center;
        width: 104px;
        height: 104px;
        font-size: 3.4rem;
        background: var(--accent-dim);
        border: 1px solid var(--line);
        border-radius: 28px;
      }

      h1 {
        margin-top: 1.4rem;
        font-family: "Segoe UI Variable Display", "Segoe UI", sans-serif;
        font-size: 2.8rem;
        font-weight: 650;
        letter-spacing: -0.02em;
        text-shadow: 0 2px 24px rgba(0, 0, 0, 0.6);
      }

      .message {
        margin-top: 0.8rem;
        font-size: 1.3rem;
        color: var(--muted);
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.6);
      }

      /* Merged popups: shrink items so several fit comfortably. */
      body.multi .tile {
        width: 64px;
        height: 64px;
        font-size: 2rem;
        border-radius: 18px;
      }

      body.multi h1 {
        margin-top: 0.7rem;
        font-size: 1.8rem;
      }

      body.multi .message {
        margin-top: 0.35rem;
        font-size: 1.1rem;
      }

      body.multi .item + .item {
        margin-top: 1.8rem;
      }

      #done {
        margin-top: 3rem;
        min-width: 13rem;
        padding: 0.85rem 3rem;
        font-size: 1.1rem;
        font-weight: 600;
        font-family: inherit;
        font-variant-numeric: tabular-nums;
        color: #071018;
        background: var(--accent);
        border: none;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.08s ease;
      }

      #done:hover:not(:disabled) {
        background: #66aaff;
      }

      #done:active:not(:disabled) {
        transform: scale(0.985);
      }

      #done:disabled {
        background: rgba(255, 255, 255, 0.09);
        color: var(--muted);
        cursor: not-allowed;
      }

      #snooze {
        display: block;
        margin: 1.4rem auto 0;
        padding: 0.45rem 1.2rem;
        font-size: 0.95rem;
        font-family: inherit;
        color: var(--muted);
        background: none;
        border: 1px solid var(--line);
        border-radius: 999px;
        cursor: pointer;
        transition: color 0.15s ease, border-color 0.15s ease;
      }

      #snooze:hover {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.25);
      }

      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      #quip {
        margin: 2.2rem auto 0;
        max-width: 34rem;
        font-size: 0.95rem;
        line-height: 1.5;
        color: var(--muted);
        opacity: 0;
        transition: opacity 0.6s ease 0.4s;
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.6);
      }

      #quip.show {
        opacity: 1;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>

  <body>
    <main class="card">
      <div id="items"></div>
      <button id="done">Done ✓</button>
      <button id="snooze">Snooze 5 min</button>
      <p id="quip"></p>
    </main>
  </body>
</html>
