<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pause-ture reminder</title>
    <script type="module" src="/src/reminder.ts" defer></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #1b2735 0%, #090a0f 100%);
        color: #f5f5f5;
        font-family: "Segoe UI", system-ui, sans-serif;
        user-select: none;
        cursor: default;
      }

      .card {
        text-align: center;
        max-width: 44rem;
        padding: 2rem;
      }

      .item + .item {
        margin-top: 2.5rem;
      }

      .emoji {
        font-size: 6rem;
        line-height: 1;
      }

      h1 {
        margin-top: 1.5rem;
        font-size: 3rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .message {
        margin-top: 1rem;
        font-size: 1.4rem;
        color: #b8c4d0;
      }

      /* Merged popups: shrink items so several fit comfortably. */
      body.multi .emoji {
        font-size: 3.5rem;
      }

      body.multi h1 {
        margin-top: 0.75rem;
        font-size: 2rem;
      }

      body.multi .message {
        margin-top: 0.5rem;
        font-size: 1.15rem;
      }

      body.multi .item + .item {
        margin-top: 2rem;
      }

      #done {
        margin-top: 3rem;
        padding: 0.9rem 3.5rem;
        font-size: 1.2rem;
        font-family: inherit;
        color: #090a0f;
        background: #f5f5f5;
        border: none;
        border-radius: 999px;
        cursor: pointer;
      }

      #done:hover:not(:disabled) {
        background: #ffffff;
      }

      #done:disabled {
        background: #2e3a48;
        color: #8fa0b3;
        cursor: not-allowed;
      }

      #snooze {
        display: block;
        margin: 1.5rem auto 0;
        padding: 0.4rem 1rem;
        font-size: 0.95rem;
        font-family: inherit;
        color: #8fa0b3;
        background: none;
        border: none;
        cursor: pointer;
      }

      #snooze:hover {
        color: #b8c4d0;
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <main class="card">
      <div id="items"></div>
      <button id="done">Done ✓</button>
      <button id="snooze">Snooze 5 min</button>
    </main>
  </body>
</html>
